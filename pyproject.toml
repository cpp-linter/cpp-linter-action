[project]
name = "cpp-linter-action"
version = "0.0.0+private_virtual"
requires-python = ">=3.10"
dependencies = []

[dependency-groups]
action = [
    "cpp-linter==2.0.0-rc22",
]
dev = [
    "mypy>=2.1.0",
    "pre-commit>=4.6.0",
    "ruff>=0.15.20",
]
docs = [
    "markdown-gfm-admonition>=0.1.1",
    "mkdocs>=1.6.1",
    "mkdocs-gen-files>=0.5.0",
    "mkdocs-include-markdown-plugin>=7.3.0",
    "mkdocs-material>=9.6.16",
    "pyyaml>=6.0.2",
]

[[tool.uv.index]]
name = "testPyPI"
url = "https://test.pypi.org/simple/"
explicit = true

[tool.uv.sources]
cpp-linter = { index = "testPyPI" }
